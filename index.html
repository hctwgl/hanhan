    // ==========================================================================
    // B. 本地状态管理 (Local State & Storage Initialization)

    let state = {
      punchDates: JSON.parse(localStorage.getItem('yuwen_punch_dates') || '[]'),
      pinyinLearned: JSON.parse(localStorage.getItem('yuwen_pinyin_learned') || '[]'),

    // ==========================================================================
    // C. 页面初始化渲染 (App Entry & DOM Injections)
    // ==========================================================================
    window.addEventListener('DOMContentLoaded', () => {
      // 1. 渲染拼音卡片
      renderPinyinGrid('shangmu');
      renderPinyinGrid('yunmu');
      renderPinyinGrid('zhengti');

      loadPoetry(0);
      
      // 3. 更新全局数据状态与成就解锁情况
      checkPunchState();
      updateStats();
      checkAchievements(false); // 页面加载时悄悄检查，不放烟花

      document.body.addEventListener('click', unlockAudioContext);
      document.body.addEventListener('touchstart', unlockAudioContext);

    // ==========================================================================
    // D. 核心视图切换逻辑
    // ==========================================================================
    function switchView(viewName) {
      // 隐藏所有视图
      document.querySelectorAll('.tab-view').forEach(view => {
        view.classList.remove('active');
      });
      // 显示目标视图
      const activeView = document.getElementById(`view-${viewName}`);
      if (activeView) activeView.classList.add('active');

      // 更新导航项高亮
      document.querySelectorAll('.bottom-nav-bar .nav-item').forEach(item => {
        item.classList.remove('active');
      });
      const activeNav = document.getElementById(`nav-${viewName}`);
      if (activeNav) activeNav.classList.add('active');

      // 如果切换到成就墙，实时重新检查打卡天数与数据
      if (viewName === 'medals') {
        updateStats();
        checkAchievements(true); // 如果有新达成，触发烟花！
      }
    }

    // ==========================================================================
    // E. 📅 今日已学习打卡模块逻辑
    // ==========================================================================
    function checkPunchState() {
      const todayStr = new Date().toDateString();
      const btn = document.getElementById('btn-punch-action');
      const text = document.getElementById('punch-btn-text');
      const icon = document.getElementById('punch-btn-icon');
      const desc = document.getElementById('punch-status-text');

      if (state.punchDates.includes(todayStr)) {
        btn.classList.add('punched');
        btn.disabled = true;
        text.innerText = '今日已打卡盖章';
        icon.innerText = '✅';
        desc.innerText = `恭喜翰翰！今天任务完成，已连续打卡 ${calculateStreak()} 天！`;
      } else {
        btn.classList.remove('punched');
        btn.disabled = false;
        text.innerText = '立即打卡盖章';
        icon.innerText = '✏️';
        desc.innerText = `今天也是收获满满的一天，和翰翰一起打卡盖章吧！`;
      }
    }

    function calculateStreak() {
      if (state.punchDates.length === 0) return 0;
      let streak = 0;
      let checkDate = new Date();
      
      while (true) {
        const checkStr = checkDate.toDateString();
        if (state.punchDates.includes(checkStr)) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1); // 往前推一天
        } else {
          break;
        }
      }
      return streak;
    }

    function performDailyPunch() {
      const todayStr = new Date().toDateString();
      if (!state.punchDates.includes(todayStr)) {
        state.punchDates.push(todayStr);
        localStorage.setItem('yuwen_punch_dates', JSON.stringify(state.punchDates));
        
        // 播放打卡声与闪烁金光
        speakWords("打卡成功！翰翰真棒！");
        
        checkPunchState();
        updateStats();
        
        // 触发成就烟花检查！
        setTimeout(() => {
          checkAchievements(true);
        }, 800);
      }
    }

        panel.classList.remove('active');
      });

      document.getElementById(`tab-pinyin-${type}`).classList.add('active');
      document.getElementById(`tab-pinyin-${type}`).setAttribute('aria-selected', 'true');
      document.getElementById(`panel-pinyin-${type}`).classList.add('active');
    }

    function renderPinyinGrid(type) {
      const panel = document.getElementById(`panel-pinyin-${type}`);
      panel.innerHTML = '';
      
      const letters = PINYIN_DATA[type];
      letters.forEach(letter => {
        const card = document.createElement('button');
        card.className = 'pinyin-card';
        card.setAttribute('aria-label', `拼音 ${letter}`);
        card.onclick = () => playPinyinSound(letter);

        const span = document.createElement('span');
        span.className = 'pinyin-card-text';
        span.innerText = letter;

        card.appendChild(span);
        panel.appendChild(card);
      });
    }

    function playPinyinSound(letter) {
      // 1. 标准拼音发音对照转换，排除浏览器拼音字母直接发音失效困境
      const speakWord = PINYIN_SOUND_MAP[letter] || letter;
      
      // 2. 激发 Web Speech 极速普通话清晰读出该字音
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(speakWord);
        utter.lang = 'zh-CN';
        utter.rate = 0.72; // 稍慢教学语速，保证孩子清晰辨听
        utter.pitch = 1.25; // 清脆童真或年轻女老师亮音调
        window.speechSynthesis.speak(utter);
      }

      // 3. 统计认读个数进度
      if (!state.pinyinLearned.includes(letter)) {
        state.pinyinLearned.push(letter);
        localStorage.setItem('yuwen_pinyin_learned', JSON.stringify(state.pinyinLearned));
        updateStats();
        // 点击即可检查成就
        setTimeout(() => {
          checkAchievements(true);
        }, 1200);
      }
    }

    // ==========================================================================
    // G. 📖 古诗点读阁（拼音汉字完美排列与遮罩背诵）
    // ==========================================================================
    function renderPoetryMenu() {
      const menuList = document.getElementById('poetry-menu-list');
      menuList.innerHTML = '';

      POETRY_DATABASE.forEach((poem, index) => {
        const btn = document.createElement('button');
        btn.className = `poetry-menu-item ${index === state.currentPoetryIndex ? 'active' : ''}`;
        btn.onclick = () => loadPoetry(index);

        const titleSpan = document.createElement('span');
        titleSpan.innerText = poem.title;

        const statusSpan = document.createElement('span');
        statusSpan.className = 'poetry-item-status';
        statusSpan.id = `poetry-status-badge-${poem.id}`;
        statusSpan.innerText = state.poetryMemorized.includes(poem.id) ? '✅ 已背' : '📖 未背';

        btn.appendChild(titleSpan);
        btn.appendChild(statusSpan);
        menuList.appendChild(btn);
      });
    }

    function loadPoetry(index) {
      state.currentPoetryIndex = index;
      const poem = POETRY_DATABASE[index];
      
      // 1. 刷新目录选中样式
      document.querySelectorAll('.poetry-menu-item').forEach((btn, idx) => {
        if (idx === index) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      // 2. 渲染古诗基本要素
      document.getElementById('current-poetry-title').innerText = poem.title;
      document.getElementById('current-poetry-author').innerText = poem.author;

      // 3. 渲染古诗正文
      const body = document.getElementById('poetry-lines-body');
      body.innerHTML = '';

      poem.lines.forEach(line => {
        const lineDiv = document.createElement('div');
        lineDiv.className = 'poetry-line';
        lineDiv.title = '点击播放本行句子标准朗读';
        
        // 点击整行，标准朗读该行
        lineDiv.onclick = (e) => {
          // 如果点击了字格或遮罩本身，阻止冒泡，不触发整行朗读
          if (e.target.closest('.char-group')) return;
          speakWords(line.hanzi.join(''));
        };

        // 渲染单字组 (字音双层精准对齐)
        line.hanzi.forEach((char, charIdx) => {
          const pinyin = line.pinyin[charIdx];

          const group = document.createElement('div');
          group.className = 'char-group';
          
          // 给诗句的后半句设定遮罩属性（例如，一行如果多于 3 个字，则遮住最后 2 个字；如果是 3 个字，遮住最后 1 个字）
          const isMaskTarget = (line.hanzi.length > 3) ? (charIdx >= line.hanzi.length - 2) : (charIdx >= line.hanzi.length - 1);
          
          // 如果开启了遮罩捉迷藏模式，且是目标字，则添加 masked 类
          if (state.maskMode && isMaskTarget) {
            group.classList.add('masked');
          }

          // 上层拼音
          const pinyinDiv = document.createElement('div');
          pinyinDiv.className = 'char-pinyin';
          pinyinDiv.innerText = pinyin;

          // 下层 3D 汉字翻转容器
          const hanziContainer = document.createElement('div');
          hanziContainer.className = 'char-hanzi';

          // 正面：绿色小树叶遮罩
          const maskDiv = document.createElement('div');
          maskDiv.className = 'char-hanzi-mask';
          maskDiv.onclick = (e) => {
            e.stopPropagation();
            // 翻转显现本字
            group.classList.remove('masked');
            // 朗读单个汉字
            speakWords(char);
          };

          // 反面：真实汉字
          const realDiv = document.createElement('div');
          realDiv.className = 'char-hanzi-real';
          realDiv.innerText = char;
          realDiv.onclick = (e) => {
            e.stopPropagation();
            // 读音
            speakWords(char);
            // 如果是在捉迷藏模式下，再次点击可以重新隐藏回去，增加反复背诵乐趣
            if (state.maskMode && isMaskTarget) {
              group.classList.add('masked');
            }
          };

          hanziContainer.appendChild(maskDiv);
          hanziContainer.appendChild(realDiv);
          
          group.appendChild(pinyinDiv);
          group.appendChild(hanziContainer);
          lineDiv.appendChild(group);
        });

        body.appendChild(lineDiv);
      });

      // 4. 更新背诵复选框状态
      updatePoetryCheckboxState();
    }

    function toggleMaskMode(checked) {
      state.maskMode = checked;
      // 重新渲染当前古诗，激活或隐去遮罩
      loadPoetry(state.currentPoetryIndex);
    }

    function speakWords(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        // 滤去杂音和标点
        const clean = text.replace(/[^\u4e00-\u9fa5]/g, '');
        const utter = new SpeechSynthesisUtterance(clean);
        utter.lang = 'zh-CN';
        utter.rate = 0.75;
        utter.pitch = 1.15;
        window.speechSynthesis.speak(utter);
      }
    }

    function speakEntirePoetry() {
      const poem = POETRY_DATABASE[state.currentPoetryIndex];
      const fullText = poem.lines.map(line => line.hanzi.join('')).join('，');
      speakWords(poem.title + '，' + poem.author + '，' + fullText);
    }

    // 诗底熟背背诵打卡逻辑
    function updatePoetryCheckboxState() {
      const poem = POETRY_DATABASE[state.currentPoetryIndex];
      const btn = document.getElementById('btn-poetry-completed');
      const icon = document.getElementById('poetry-checkbox-icon');
      const text = document.getElementById('poetry-checkbox-text');
      const isCompleted = state.poetryMemorized.includes(poem.id);

      if (isCompleted) {
        btn.classList.add('checked');
        icon.innerText = '✅';
        text.innerText = '翰翰已背会，打卡成功！';
      } else {
        btn.classList.remove('checked');
        icon.innerText = '⬜';
        text.innerText = '我已熟练背会这首诗';
      }
    }

    function togglePoetryMemorized() {
      const poem = POETRY_DATABASE[state.currentPoetryIndex];
      const idx = state.poetryMemorized.indexOf(poem.id);
      
      if (idx > -1) {
        // 取消背诵
        state.poetryMemorized.splice(idx, 1);
      } else {
        // 标记熟背
        state.poetryMemorized.push(poem.id);
        speakWords("真聪明！背得太流利了！奖励一朵小红花！");
      }

      localStorage.setItem('yuwen_poetry_memorized', JSON.stringify(state.poetryMemorized));
      
      // 更新古诗列表的状态徽章
      const badge = document.getElementById(`poetry-status-badge-${poem.id}`);
      if (badge) {
        badge.innerText = state.poetryMemorized.includes(poem.id) ? '✅ 已背' : '📖 未背';
      }
      
      updatePoetryCheckboxState();
      updateStats();

      // 每次修改背诵，触发勋章检查
      setTimeout(() => {
        checkAchievements(true);
      }, 1000);
    }

    // ==========================================================================
    // H. 🏅 荣誉成就墙与 localStorage 跨页联动逻辑
    // ==========================================================================
    function updateStats() {
      // 1. 打卡数
      document.getElementById('stat-punch-count').innerText = state.punchDates.length;
      // 2. 拼音数
      document.getElementById('stat-pinyin-count').innerText = `${state.pinyinLearned.length} / 63`;
      // 3. 古诗背会数
      document.getElementById('stat-poetry-count').innerText = `${state.poetryMemorized.length} / 4`;
    }

    // 检查并自动点亮勋章（跨页面 localStorage 联动核心）
    function checkAchievements(allowFireworks = true) {
      // 从 localStorage 中读取来自已有页面的通关标志
      const isBaiciCompleted = localStorage.getItem('yuwen_achievement_baici') === 'true';
      const isRecitationPlayed = localStorage.getItem('yuwen_achievement_recitation') === 'true';

      const wall = document.getElementById('achievement-medals-wall');
      wall.innerHTML = '';

      MEDAL_DATABASE.forEach(medal => {
        let isUnlocked = false;

        // 根据每枚勋章对应的条件计算是否解锁
        switch (medal.id) {
          case 'medal_baici':
            isUnlocked = isBaiciCompleted;
            break;
          case 'medal_recitation':
            isUnlocked = isRecitationPlayed;
            break;
          case 'medal_pinyin':
            // 拼音点读满 20 个音节
            isUnlocked = state.pinyinLearned.length >= 20;
            break;
          case 'medal_poetry':
            // 背会全部 4 首古诗
            isUnlocked = state.poetryMemorized.length >= 4;
            break;
          case 'medal_diligent':
            // 打卡 3 次及以上
            isUnlocked = state.punchDates.length >= 3;
            break;
        }

        // 获取该勋章上一次的解锁状态，避免重复触发烟花
        const prevUnlockedKey = `yuwen_medal_unlocked_shown_${medal.id}`;
        const hasShownBefore = localStorage.getItem(prevUnlockedKey) === 'true';

        if (isUnlocked && !hasShownBefore) {
          // 第一次解锁此勋章！
          localStorage.setItem(prevUnlockedKey, 'true');
          
          if (allowFireworks) {
            // 触发金色璀璨烟花，并用 Web Speech 甜美宣告！
            startFireworks();
            setTimeout(() => {
              speakWords(`太了不起了！翰翰点亮了勋章：${medal.title}！继续加油！`);
            }, 300);
          }
        }

        // 渲染勋章 DOM
        const medalCard = document.createElement('div');
        medalCard.className = `medal-card ${isUnlocked ? 'unlocked' : 'locked'}`;
        if (isUnlocked) {
          medalCard.title = '点击触发金光庆祝特效！';
          medalCard.onclick = () => {
            startFireworks();
            speakWords(medal.title);
          };
        }

        const badgeWrapper = document.createElement('div');
        badgeWrapper.className = 'medal-badge-wrapper';

        const badgeSpan = document.createElement('div');
        badgeSpan.className = 'medal-badge';
        badgeSpan.innerText = medal.emoji;

        badgeWrapper.appendChild(badgeSpan);

        const titleH3 = document.createElement('h3');
        titleH3.className = 'medal-title';
        titleH3.innerText = medal.title;

        const descP = document.createElement('p');
        descP.className = 'medal-desc';
        descP.innerText = medal.desc;

        const statusSpan = document.createElement('span');
        statusSpan.className = 'medal-status-badge';
        statusSpan.innerText = isUnlocked ? '🌟 已点亮' : '🔒 待解锁';

        medalCard.appendChild(badgeWrapper);
        medalCard.appendChild(titleH3);
        medalCard.appendChild(descP);
        medalCard.appendChild(statusSpan);

        wall.appendChild(medalCard);
      });
    }

    // ==========================================================================
    // I. 🎆 Canvas 金粒子璀璨烟花喷发引擎
    // ==========================================================================
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    
    let particles = [];
    let animationFrameId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        // 爆炸扩散初始速度
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.012; // 褪色速度
        this.gravity = 0.15; // 粒子重力下落
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        // 绘制高反光金光圆粒子
        ctx.arc(this.x, this.y, Math.random() * 2 + 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        // 增添辉光特效
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.restore();
      }

      update() {
        this.x += this.vx;
        this.vy += this.gravity;
        this.y += this.vy;
        this.alpha -= this.decay;
      }
    }

    function createExplosion(x, y) {
      // 经典金黄、琥珀色、亮红、翡翠绿的节日彩虹配色组合
      const colors = ['#ffd54f', '#ffb300', '#ff8f00', '#ff3d00', '#00e676', '#00b0ff', '#e040fb'];
      for (let i = 0; i < 60; i++) {
        const color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new Particle(x, y, color));
      }
    }

    function animateFireworks() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      if (particles.length > 0) {
        animationFrameId = requestAnimationFrame(animateFireworks);
      } else {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    function startFireworks() {
      // 连续发射多波震撼礼花
      const midX = window.innerWidth / 2;
      const midY = window.innerHeight / 2.5;

      // 第一发：中心爆开
      createExplosion(midX, midY);
      
      // 第二、三发：左右稍偏低处交替爆开，形成大瀑布金光流
      setTimeout(() => {
        createExplosion(midX - 160, midY + 40);
      }, 250);
      setTimeout(() => {
        createExplosion(midX + 160, midY + 40);
      }, 500);

      if (!animationFrameId) {
        animateFireworks();
      }
    }

    // ==========================================================================
    // J. iOS Safari 音频及安全解锁机制
    // ==========================================================================
    let isAudioUnlocked = false;
    function unlockAudioContext() {
      if (isAudioUnlocked) return;
      if ('speechSynthesis' in window) {
        try {
          const silentUtter = new SpeechSynthesisUtterance(' ');
          silentUtter.volume = 0;
          window.speechSynthesis.speak(silentUtter);
        } catch(e){}
      }
      isAudioUnlocked = true;
      document.body.removeEventListener('click', unlockAudioContext);
      document.body.removeEventListener('touchstart', unlockAudioContext);
    }
  </script>
</body>
