<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>一年级下册生字测验卷 (四至七单元)</title>
<style>
  /* 确保打印时保留红绿线条颜色 */
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  body { font-family: sans-serif; padding: 20px; color: #333; }
  .page { max-width: 800px; margin: 0 auto; text-align: left; }
  h1 { text-align: center; margin-bottom: 5px; }
  .header-info { text-align: center; margin-bottom: 30px; font-size: 16px; }
  h2 { border-bottom: 2px solid #333; padding-bottom: 5px; margin-top: 35px; font-size: 18px; }
  
  /* 整体网格布局 */
  .grid-box { display: flex; flex-wrap: wrap; gap: 15px 12px; margin-top: 15px; }
  .char-wrap { width: 50px; display: flex; flex-direction: column; align-items: center; }

  /* 拼音四线三格绘制 (标准绿色) */
  .sixian { 
    width: 100%; height: 24px; position: relative; 
    border-top: 1px solid #4caf50; border-bottom: 1px solid #4caf50; 
    display: flex; align-items: center; justify-content: center; 
  }
  .sixian::before { 
    content: ''; position: absolute; left: 0; top: 33%; 
    width: 100%; border-top: 1px dashed #4caf50; 
  }
  .sixian::after { 
    content: ''; position: absolute; left: 0; top: 66%; 
    width: 100%; border-top: 1px dashed #4caf50; 
  }
  .sixian span { 
    position: relative; z-index: 1; font-size: 13px; 
    font-family: Arial, sans-serif; line-height: 24px; color: #000;
  }

  /* 汉字田字格绘制 (标准红色) */
  .tianzige { 
    width: 50px; height: 50px; border: 2px solid #e53935; 
    position: relative; margin-top: 3px; box-sizing: border-box; 
  }
  .tianzige::before { 
    content: ''; position: absolute; top: 50%; left: 0; 
    width: 100%; border-top: 1px dashed #e53935; 
  }
  .tianzige::after { 
    content: ''; position: absolute; top: 0; left: 50%; 
    height: 100%; border-left: 1px dashed #e53935; 
  }
</style>
</head>
<body>
<div class="page">
  <h1>一年级下册生字测验冲刺卷</h1>
  <div class="header-info">班级：______________ 姓名：______________ 得分：______________</div>
  
  <div id="app"></div>
</div>

];

const app = document.getElementById('app');
data.forEach(sec => {
  // 渲染每个单元的标题
  app.innerHTML += `<h2>${sec.unit}</h2>`;
  
  let gridHtml = '<div class="grid-box">';
  // 遍历并渲染四线格拼音和空白田字格
  sec.words.forEach(w => {
    gridHtml += `
      <div class="char-wrap">
        <div class="sixian"><span>${w[0]}</span></div>
        <div class="tianzige"></div>
      </div>
    `;
  });
  gridHtml += '</div>';
  app.innerHTML += gridHtml;
});
</script>
</body>
</html>
